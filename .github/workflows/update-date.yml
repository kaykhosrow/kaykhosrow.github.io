name: Update Last Updated Date

on:
  push:
    branches: [main]
    paths:
      - conferences.html
      - code.html
      - index.html

jobs:
  update-conferences:
    if: contains(toJson(github.event.commits.*.modified), 'conferences.html') || contains(toJson(github.event.commits.*.added), 'conferences.html')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install beautifulsoup4 --break-system-packages
      - name: Sync and set date
        run: |
          DATE=$(date +'%m/%Y')
          python sync.py
          sed -i "s|<span id=\"last-updated\">.*</span>|<span id=\"last-updated\">$DATE</span>|" conferences.html
          sed -i "s|<span id=\"last-updated\">.*</span>|<span id=\"last-updated\">$DATE</span>|" index.html
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add conferences.html index.html && git commit -m "chore: sync conferences and update date" && git push)

  update-code:
    if: contains(toJson(github.event.commits.*.modified), 'code.html') || contains(toJson(github.event.commits.*.added), 'code.html')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install beautifulsoup4 --break-system-packages
      - name: Sync and set date
        run: |
          DATE=$(date +'%m/%Y')
          python sync.py
          sed -i "s|<span id=\"last-updated\">.*</span>|<span id=\"last-updated\">$DATE</span>|" code.html
          sed -i "s|<span id=\"last-updated\">.*</span>|<span id=\"last-updated\">$DATE</span>|" index.html
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add code.html index.html && git commit -m "chore: sync code and update date" && git push)

  update-index:
    if: contains(toJson(github.event.commits.*.modified), 'index.html') || contains(toJson(github.event.commits.*.added), 'index.html')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set date
        run: |
          DATE=$(date +'%m/%Y')
          sed -i "s|<span id=\"last-updated\">.*</span>|<span id=\"last-updated\">$DATE</span>|" index.html
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add index.html && git commit -m "chore: update last-updated date (index)" && git push)
