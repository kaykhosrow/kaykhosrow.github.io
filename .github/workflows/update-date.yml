name: Update Last Updated Date

on:
  push:
    branches: [main]

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set date
        run: |
          DATE=$(date +'%B %Y')
          sed -i "s|<span id=\"last-updated\">.*</span>|<span id=\"last-updated\">$DATE</span>|" index.html

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add index.html && git commit -m "chore: update last-updated date" && git push)
