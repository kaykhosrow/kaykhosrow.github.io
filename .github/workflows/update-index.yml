name: Update Index Date

on:
  push:
    branches: [main]
    paths:
      - index.html

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set date
        run: |
          DATE=$(date +'%m/%Y')
          sed -i "s|<span id=\"last-updated\">.*</span>|<span id=\"last-updated\">$DATE</span>|" index.html
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add index.html && git commit -m "chore: update last-updated date" && git push)
